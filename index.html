<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Management Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf6ef;
  --warm: #f0e8d8;
  --brown: #3d2b1f;
  --rust: #c4522a;
  --gold: #d4a833;
  --sage: #6b8c6e;
  --ink: #1a1208;
  --mist: #e8dfd0;
  --paper: #f5f0e8;
  --shadow: rgba(61,43,31,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--cream);
  color: var(--brown);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

.page { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; position: relative; }

/* Decorative line */
.deco-line {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--brown) 20%, var(--gold) 50%, var(--brown) 80%, transparent);
  opacity: 0.3;
  margin: 24px 0;
}

/* Header */
.header {
  text-align: center;
  padding: 48px 0 32px;
  animation: riseUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
}

.subject-tag {
  display: inline-block;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--rust);
  border: 1px solid var(--rust);
  padding: 5px 14px;
  border-radius: 2px;
  margin-bottom: 20px;
  opacity: 0.85;
}

.header h1 {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.6rem, 7vw, 4.2rem);
  font-weight: 900;
  line-height: 1.05;
  color: var(--ink);
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}

.header h1 em {
  font-style: italic;
  color: var(--rust);
}

.header-sub {
  font-size: 13px;
  color: var(--brown);
  opacity: 0.6;
  letter-spacing: 0.5px;
}

/* Welcome */
.welcome { animation: riseUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
.welcome.hide { display: none; }

.bank-info {
  display: inline-block;
  background: var(--warm);
  border: 1px solid var(--mist);
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  color: var(--brown);
  margin-bottom: 32px;
  opacity: 0.8;
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}

@media(max-width:560px) { .mode-grid { grid-template-columns: repeat(3,1fr); } }

.mode-card {
  background: var(--paper);
  border: 1.5px solid var(--mist);
  border-radius: 12px;
  padding: 18px 10px;
  cursor: pointer;
  transition: all 0.22s ease;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.mode-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--rust);
  opacity: 0;
  transition: opacity 0.2s;
}

.mode-card:hover::before, .mode-card.active::before { opacity: 0.06; }
.mode-card.active { border-color: var(--rust); box-shadow: 0 0 0 2px rgba(196,82,42,0.15); }

.mode-card .mc-icon { font-size: 24px; margin-bottom: 6px; display: block; position: relative; }
.mode-card .mc-name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700; margin-bottom: 2px; position: relative; }
.mode-card .mc-desc { font-size: 10px; color: var(--brown); opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; position: relative; }

.start-btn {
  background: var(--rust);
  color: #fff;
  border: none;
  padding: 16px 56px;
  border-radius: 100px;
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 20px rgba(196,82,42,0.3);
}

.start-btn:hover {
  background: #b04824;
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(196,82,42,0.35);
}

/* Stats */
.stats-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.stat-chip {
  background: var(--paper);
  border: 1px solid var(--mist);
  border-radius: 10px;
  padding: 10px 16px;
  flex: 1;
  text-align: center;
  min-width: 65px;
}

.stat-chip .sv {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 2px;
}

.stat-chip.ok .sv { color: var(--sage); }
.stat-chip.bad .sv { color: var(--rust); }
.stat-chip .sl { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; }

/* Progress */
.progress-wrap { margin-bottom: 28px; }
.progress-top { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.5; margin-bottom: 8px; letter-spacing: 0.5px; }
.progress-track { height: 3px; background: var(--mist); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--rust), var(--gold)); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); border-radius: 2px; }

/* Question Card */
.q-card {
  background: var(--paper);
  border: 1px solid var(--mist);
  border-radius: 20px;
  padding: 40px 36px;
  margin-bottom: 20px;
  box-shadow: 0 2px 20px var(--shadow), 0 0 0 1px rgba(255,255,255,0.7) inset;
  animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  position: relative;
}

.q-card::before {
  content: '';
  position: absolute;
  top: 0; left: 32px; right: 32px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}

.q-num {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--rust);
  opacity: 0.8;
  margin-bottom: 16px;
  font-weight: 600;
}

.q-text {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 300;
  line-height: 1.65;
  color: var(--ink);
  margin-bottom: 28px;
  white-space: pre-wrap;
}

.multi-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 3px 10px;
  border-radius: 100px;
  margin-bottom: 16px;
  opacity: 0.85;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }

.opt-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 18px;
  background: var(--cream);
  border: 1.5px solid var(--mist);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: left;
  color: var(--brown);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.55;
  width: 100%;
  position: relative;
  overflow: hidden;
}

.opt-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--rust);
  opacity: 0;
  transition: opacity 0.2s;
}

.opt-btn:hover:not(:disabled)::before { opacity: 0.04; }
.opt-btn:hover:not(:disabled) { border-color: rgba(196,82,42,0.35); transform: translateX(3px); }

.opt-btn.selected { border-color: var(--rust); background: rgba(196,82,42,0.04); }
.opt-btn.correct { border-color: var(--sage); background: rgba(107,140,110,0.07); }
.opt-btn.wrong { border-color: var(--rust); background: rgba(196,82,42,0.06); }
.opt-btn.show-correct { border-color: var(--sage); background: rgba(107,140,110,0.04); }

.opt-letter {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; min-width: 28px;
  border-radius: 8px;
  background: var(--mist);
  font-family: 'Fraunces', serif;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.18s;
  position: relative;
  flex-shrink: 0;
}

.opt-btn.selected .opt-letter { background: var(--rust); color: #fff; }
.opt-btn.correct .opt-letter { background: var(--sage); color: #fff; }
.opt-btn.wrong .opt-letter { background: var(--rust); color: #fff; }
.opt-btn.show-correct .opt-letter { background: var(--sage); color: #fff; }

.opt-text { flex: 1; position: relative; }
.opt-icon { margin-left: auto; font-size: 16px; min-width: 20px; text-align: right; position: relative; }

/* Explanation */
.expl {
  margin-top: 20px;
  padding: 16px 20px;
  background: rgba(212,168,51,0.07);
  border-left: 2px solid var(--gold);
  border-radius: 0 10px 10px 0;
  font-size: 12.5px;
  color: var(--brown);
  line-height: 1.7;
  opacity: 0.8;
  display: none;
}

.expl.show { display: block; animation: fadeIn 0.3s ease; }

/* Controls */
.controls { display: flex; gap: 10px; margin-top: 20px; }

.btn {
  padding: 13px 24px;
  border-radius: 100px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.2px;
}

.btn-primary {
  background: var(--rust);
  color: #fff;
  flex: 1;
  box-shadow: 0 3px 12px rgba(196,82,42,0.25);
}

.btn-primary:hover { background: #b04824; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-secondary {
  background: var(--paper);
  color: var(--brown);
  border: 1.5px solid var(--mist);
}

.btn-secondary:hover { border-color: var(--rust); color: var(--rust); }

/* Result */
.result { text-align: center; display: none; }
.result.show { display: block; animation: riseUp 0.7s cubic-bezier(0.16,1,0.3,1) both; }

.result-badge {
  display: inline-block;
  width: 96px; height: 96px;
  border-radius: 50%;
  background: var(--warm);
  border: 3px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  margin: 0 auto 20px;
  animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  box-shadow: 0 4px 20px rgba(212,168,51,0.2);
}

.result-score {
  font-family: 'Fraunces', serif;
  font-size: clamp(3.5rem, 10vw, 6rem);
  font-weight: 900;
  color: var(--rust);
  line-height: 1;
  margin-bottom: 6px;
}

.result-sub {
  font-size: 14px;
  opacity: 0.6;
  margin-bottom: 12px;
  letter-spacing: 0.5px;
}

.rank-tag {
  display: inline-block;
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 700;
  padding: 8px 28px;
  border-radius: 100px;
  margin-bottom: 36px;
  letter-spacing: 0.5px;
}

.result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 36px; }

.res-item {
  background: var(--paper);
  border: 1px solid var(--mist);
  border-radius: 16px;
  padding: 20px;
}

.res-item .rb { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; margin-bottom: 4px; }
.res-item .rs { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; }
.res-item.rc .rb { color: var(--sage); }
.res-item.rw .rb { color: var(--rust); }
.res-item.rsk .rb { color: var(--gold); }

.result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* Review */
.review-hdr {
  text-align: left;
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  margin: 48px 0 20px;
  color: var(--ink);
}

.rev-item {
  background: var(--paper);
  border: 1px solid var(--mist);
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.rev-item.ok { border-left: 3px solid var(--sage); }
.rev-item.ng { border-left: 3px solid var(--rust); }

.rev-q { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.5; display: flex; gap: 8px; color: var(--ink); }
.rev-n { font-family: 'Fraunces', serif; font-size: 11px; color: var(--rust); white-space: nowrap; margin-top: 1px; font-weight: 700; }
.rev-ans { display: flex; gap: 6px; flex-wrap: wrap; }

.ans-tag {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.ans-tag.right { background: rgba(107,140,110,0.1); color: var(--sage); }
.ans-tag.wrong { background: rgba(196,82,42,0.1); color: var(--rust); }
.ans-tag.correct { background: rgba(107,140,110,0.08); color: var(--sage); border: 1px solid rgba(107,140,110,0.3); }

/* Sound toggle */
.sound-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 42px; height: 42px;
  background: var(--paper);
  border: 1.5px solid var(--mist);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
  z-index: 100;
  box-shadow: 0 2px 10px var(--shadow);
}

.sound-toggle:hover { border-color: var(--rust); transform: scale(1.05); }

/* Timer */
.timer-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.timer-ring {
  position: relative;
  width: 52px;
  height: 52px;
  flex-shrink: 0;
}

.timer-ring svg {
  transform: rotate(-90deg);
  width: 52px;
  height: 52px;
}

.timer-ring circle {
  fill: none;
  stroke-width: 3.5;
}

.timer-ring .track { stroke: var(--mist); }
.timer-ring .fill {
  stroke: var(--rust);
  stroke-linecap: round;
  stroke-dasharray: 138.23; /* 2*PI*22 */
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.3s;
}

.timer-ring .fill.warn { stroke: var(--gold); }
.timer-ring .fill.danger { stroke: #e03a1e; }

.timer-num {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--brown);
  line-height: 1;
  pointer-events: none;
}

.timer-num.warn { color: var(--gold); }
.timer-num.danger { color: #e03a1e; }

.timer-bar-track {
  flex: 1;
  height: 6px;
  background: var(--mist);
  border-radius: 4px;
  overflow: hidden;
}

.timer-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rust), var(--gold));
  border-radius: 4px;
  transition: width 1s linear, background 0.3s;
}

.timer-bar-fill.warn { background: linear-gradient(90deg, var(--gold), #e8b84b); }
.timer-bar-fill.danger { background: linear-gradient(90deg, #e03a1e, var(--rust)); }

@keyframes timerPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.timer-num.pulse { animation: timerPulse 0.5s ease infinite; }

/* Ripple effect */
@keyframes ripple {
  0% { transform: scale(0); opacity: 0.4; }
  100% { transform: scale(4); opacity: 0; }
}

.ripple-circle {
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--rust);
  opacity: 0;
  animation: ripple 0.5s ease-out forwards;
  pointer-events: none;
  transform: scale(0);
}

/* Animations */
@keyframes riseUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
@keyframes cardIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
@keyframes popIn { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes bounceRight { 0%{transform:translateX(0)} 50%{transform:translateX(6px)} 100%{transform:translateX(0)} }
@keyframes correctPulse { 0%{box-shadow:0 2px 20px var(--shadow)} 50%{box-shadow:0 0 0 8px rgba(107,140,110,0.12),0 2px 20px var(--shadow)} 100%{box-shadow:0 2px 20px var(--shadow)} }

.shake { animation: shake 0.4s ease; }
.bounce { animation: bounceRight 0.35s ease; }
.correct-pulse { animation: correctPulse 0.5s ease; }

@media(max-width:560px) { .q-card{padding:24px 18px} .controls{flex-direction:column} }
</style>
</head>
<body>

<button class="sound-toggle" id="soundToggle" title="Toggle sound">🔊</button>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="subject-tag">Management Studies</div>
    <h1>Quiz <em>Time</em></h1>
    <p class="header-sub">Principles of Management — Ôn tập trắc nghiệm</p>
  </div>

  <div class="deco-line"></div>

  <!-- Welcome -->
  <div class="welcome" id="welcome">
    <div style="text-align:center;margin-bottom:28px">
      <span class="bank-info" id="bankInfo">📚 Đang tải câu hỏi...</span>
    </div>
    <div class="mode-grid" id="modeGrid">
      <div class="mode-card active" data-n="10"><span class="mc-icon">⚡</span><div class="mc-name">10</div><div class="mc-desc">Quick</div></div>
      <div class="mode-card" data-n="20"><span class="mc-icon">🎯</span><div class="mc-name">20</div><div class="mc-desc">Standard</div></div>
      <div class="mode-card" data-n="30"><span class="mc-icon">🔥</span><div class="mc-name">30</div><div class="mc-desc">Hard</div></div>
      <div class="mode-card" data-n="50"><span class="mc-icon">💪</span><div class="mc-name">50</div><div class="mc-desc">Pro</div></div>
      <div class="mode-card" data-n="0"><span class="mc-icon">💀</span><div class="mc-name">All</div><div class="mc-desc">Full</div></div>
    </div>
    <div style="text-align:center">
      <button class="start-btn" id="startBtn">Bắt đầu →</button>
    </div>
  </div>

  <!-- Quiz -->
  <div id="quiz" style="display:none">
    <div class="stats-bar">
      <div class="stat-chip"><span class="sv" id="sCur">1</span><span class="sl">Câu</span></div>
      <div class="stat-chip"><span class="sv" id="sTotal">—</span><span class="sl">Tổng</span></div>
      <div class="stat-chip ok"><span class="sv" id="sOk">0</span><span class="sl">Đúng</span></div>
      <div class="stat-chip bad"><span class="sv" id="sWr">0</span><span class="sl">Sai</span></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top"><span id="pLbl">Câu 1</span><span id="pPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    </div>
    <!-- Timer -->
    <div class="timer-wrap" id="timerWrap">
      <div class="timer-ring" id="timerRing">
        <svg viewBox="0 0 52 52">
          <circle class="track" cx="26" cy="26" r="22"/>
          <circle class="fill" id="timerCircle" cx="26" cy="26" r="22"/>
        </svg>
        <div class="timer-num" id="timerNum">60</div>
      </div>
      <div class="timer-bar-track">
        <div class="timer-bar-fill" id="timerBar" style="width:100%"></div>
      </div>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-num" id="qNum">QUESTION 01</div>
      <div class="q-text" id="qText"></div>
      <div id="mBadge"></div>
      <div class="options" id="opts"></div>
      <div class="expl" id="expl"></div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="skipBtn">Bỏ qua</button>
      <button class="btn btn-primary" id="submitBtn" disabled>Xác nhận ✓</button>
      <button class="btn btn-primary" id="nextBtn" style="display:none">Tiếp theo →</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-badge" id="rEmoji">🎉</div>
    <div class="result-score" id="rPct">—</div>
    <div class="result-sub" id="rSub"></div>
    <div class="rank-tag" id="rTag"></div>

// =================== SOUND ENGINE ===================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundOn = true;

function getCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, type, dur, vol = 0.3, delay = 0) {
  if (!soundOn) return;
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {}
}

function soundClick() {
  playTone(440, 'sine', 0.08, 0.15);
}

function soundSelect() {
  playTone(520, 'sine', 0.1, 0.2);
  playTone(660, 'sine', 0.08, 0.15, 0.06);
}

function soundCorrect() {
  // Happy ascending arpeggio
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.18, 0.25, i * 0.07));
}

function soundWrong() {
  // Low descending buzz
  playTone(300, 'sawtooth', 0.12, 0.2);
  playTone(220, 'sawtooth', 0.15, 0.18, 0.1);
}

function soundSkip() {
  playTone(350, 'triangle', 0.1, 0.15);
  playTone(280, 'triangle', 0.12, 0.12, 0.08);
}

function soundSubmit() {
  playTone(480, 'sine', 0.1, 0.2);
}

function soundComplete() {
  // Triumphant fanfare
  const melody = [523, 659, 784, 659, 784, 1047];
  melody.forEach((f, i) => playTone(f, 'sine', 0.25, 0.3, i * 0.1));
}

function soundStart() {
  [262, 330, 392, 523].forEach((f, i) => playTone(f, 'sine', 0.15, 0.25, i * 0.08));
}

document.getElementById('soundToggle').addEventListener('click', () => {
  soundOn = !soundOn;
  document.getElementById('soundToggle').textContent = soundOn ? '🔊' : '🔇';
  if (soundOn) soundClick();
});

// =================== RIPPLE ===================
function addRipple(btn, e) {
  const rect = btn.getBoundingClientRect();
  const x = (e.clientX - rect.left) - 10;
  const y = (e.clientY - rect.top) - 10;
  const ripple = document.createElement('span');
  ripple.className = 'ripple-circle';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

{q:"The radical redesign of all aspects of an organization in order to achieve major gains in cost reduction, service delivery, or reduction in order-processing time is known as",o:["A. entropy.","B. process change.","C. innovation.","D. reengineering."],a:["D"]},
{q:"Amazon introduced its 'one-click ordering' system, simplifying the online purchasing process for customers. What type of innovation does Amazon's 'one-click ordering' primarily represent?",o:["A. Radical Innovation","B. Process Innovation","C. Product Innovation","D. Managerial Innovation"],a:["B"]},
{q:"An automotive manufacturer develops a new type of hybrid engine that significantly improves fuel efficiency compared to traditional gasoline engines. What type of innovation is this?",o:["A. Managerial Innovation","B. Process Innovation","C. Technical Innovation","D. Incremental Innovation"],a:["C"]},
{q:"Apple releases a new iPhone every year. While each new model has some new features, the core functionality and design remain largely the same. What type of innovation do Apple's annual iPhone updates primarily represent?",o:["A. Incremental Innovation","B. Radical Innovation","C. Product Innovation","D. Managerial Innovation"],a:["A"]},
{q:"A company implements a new project management software that streamlines communication and task assignment among its teams, leading to increased efficiency and collaboration. What type of innovation is this?",o:["A. Technical Innovation","B. Process Innovation","C. Product Innovation","D. Managerial Innovation"],a:["B"]},
{q:"Which of the following is an effective way of overcoming resistance to change?",o:["A. Allowing employees to participate in the change process","B. Fostering an environment of uncertainty in the organization","C. Announcing the change only after it has been implemented","D. Minimizing communication among employees"],a:["A"]},
{q:"Managers can overcome resistance to change by",o:["A. not letting employees know about the change.","B. letting employees know about the change only after it has been successfully implemented.","C. limiting the involvement of employees in the change process.","D. announcing the change much in advance."],a:["D"]},
{q:"The normal process within an organization that leads to a system decline is known as",o:["A. reengineering.","B. synergy.","C. process gain.","D. entropy."],a:["D"]},
{q:"Libra Technologies Inc. frequently asks its employees to measure such things as supervisor effectiveness. The company circulates various questionnaires among all its employees to get their insights. Which organization development is illustrated?",o:["A. Third-party peacemaking","B. Survey feedback","C. Team building","D. Process consultation"],a:["B"]},
{q:"Sales are down, and Francis knows he needs to make some changes. He is now trying to understand whether the downturn was caused by poor customer service, poor quality product, improper pricing, or some other factor. Which step has Francis reached in the comprehensive approach to change?",o:["A. Recognizing the need for change","B. Implementing the change","C. Setting goals for the change","D. Selecting a change technique","E. Diagnosing relevant variables"],a:["E"]},
{q:"Ron, a manager at a hardware component manufacturing unit, has recently learned that the production rates in his firm have gone down because of poor employee morale. Ron has realized that he needs to make a change in the organization that will motivate employees. Which of the following steps in the comprehensive approach to change is illustrated?",o:["A. Recognizing the need for change","B. Understanding how to implement the change","C. Setting goals for the change","D. Selecting a change technique"],a:["A"]},
{q:"A company has set an objective to increase its product sales by 50 percent in the next two years. Identify the step of the organization change process of the company.",o:["A. Recognition of the need for change","B. Establishment of goals for the change","C. Selection of appropriate change technique","D. Planning for implementation of the change"],a:["B"]},
{q:"A change in reporting relationships within an organization is an example of change in the area of",o:["A. organization structure.","B. organizational operations.","C. work processes.","D. information technology."],a:["A"]},
{q:"Substantive modification to some part of an organization is known as organization",o:["A. synergy.","B. maturity.","C. implementation.","D. change."],a:["D"]},
{q:"When Beta Inc. acquired Redd Communications, there was a huge uproar by the staff of Redd Communications as there were rumors of staff reductions and operations closures. ______ was the cause for this reaction.",o:["A. Synergy","B. Process gain","C. Uncertainty","D. Process loss"],a:["C"]},

// LEADERSHIP
{q:"Which emerging approach to leadership focuses on adaptability across cultures?",o:["A. Ethical Leadership","B. Strategic Leadership","C. Political Leadership","D. Cross-Cultural Leadership"],a:["D"]},
{q:"The more a manager uses coercive power, the more likely he is to encourage",o:["A. sympathy.","B. good will.","C. resentment.","D. tolerance."],a:["C"]},
{q:"Demonstrating personal excitement or passion about something is part of ____ leadership.",o:["A. Charismatic","B. Entrepreneurial","C. Symbolic","D. Integrative","E. Participative"],a:["A"]},
{q:"As a property, leadership can be best defined as",o:["A. the practice of empowering employees to participate in organizational decision making.","B. a set of beliefs that supports the practice of interpersonal risk taking in teams.","C. the ability to shape employee behavior without using force.","D. a set of characteristics found in people who can influence the behavior of others."],a:["D"]},
{q:"As a process, leadership can be defined as",o:["A. the practice of empowering employees to participate in organizational decision making.","B. the set of characteristics attributed to individuals who are perceived to be leaders.","C. the use of noncoercive influence to shape an organization's goals.","D. the ability to assess business process performance."],a:["C"]},
{q:"What is a key characteristic of transformational leaders?",o:["A. Relying heavily on positional authority","B. Transmitting a sense of mission, stimulating learning experiences, and inspiring new ways of thinking","C. Maintaining the status quo within the organization","D. Prioritizing short-term results"],a:["B"]},
{q:"The first organized approach to studying leadership focused on",o:["A. leadership behavior.","B. leadership traits.","C. rewards expected.","D. situational favorableness."],a:["B"]},
{q:"According to Fiedler, a task is structured when it is:",o:["A. routine, difficult to understand, and unambiguous.","B. routine, easy to understand, and ambiguous.","C. irregular, difficult to understand, and ambiguous.","D. routine, easy to understand, and unambiguous."],a:["D"]},
{q:"According to the Path-Goal Theory, which behavior is most likely to be used by a leader when the group becomes familiar with the task and as new problems are encountered?",o:["A. Directive Behavior","B. Supportive Behavior","C. Participative Behavior","D. Achievement-Oriented Behavior"],a:["C"]},
{q:"In the context of the Ohio state studies of leadership, a leader showing consideration behavior",o:["A. attempts to establish a warm, friendly, and supportive climate at the workplace.","B. clearly defines the leader-subordinate role so that everyone knows what is expected of them.","C. establishes formal lines of communication, and determines how tasks will be performed.","D. is primarily interested in the performance of the employees."],a:["A"]},
{q:"What is the basic assumption of situational approaches to leadership?",o:["A. Increasing worker job satisfaction through considerate leadership will get the best results.","B. Initiating structure for employees so they know exactly what needs to be done will be most effective.","C. The appropriate leader style will vary from one set of circumstances to another.","D. Effective leaders can be identified by certain traits."],a:["C"]},
{q:"An individual who is motivating and inspiring people to energize them to overcome barriers by satisfying basic human needs is fulfilling what role and activity?",o:["A. Management role in developing a human network","B. Leadership role in developing a human network","C. Management role in executing plans","D. Leadership role in executing plans"],a:["B"]},
{q:"______ is the ability to affect the behavior of others.",o:["A. Power","B. Discipline","C. Function","D. Potential"],a:["A"]},
{q:"When leaders decide to either give salary increases to their employees or withhold any salary increases, which of the following types of power do they exercise?",o:["A. Coercive","B. Reward","C. Informal","D. Expert","E. Referent"],a:["B"]},
{q:"A news producer has the authority to choose which reporter will get to cover important news items. The news producer uses this authority to recognize the hard work of reporters. Which of the following types of power is the producer using?",o:["A. Referent","B. Reward","C. Legitimate","D. Coercive"],a:["B"]},
{q:"Which of the following is a defining characteristic of strategic leaders?",o:["A. They possess interpersonal attraction that inspires support and acceptance.","B. They understand the organization and recognize its superior alignment with the environment.","C. They transmit a sense of mission, stimulate learning experiences, and inspire new ways of thinking.","D. They understand international differences and diversity-based differences within one culture."],a:["B"]},
{q:"Which of the following is a situational leadership model?",o:["A. Trait approach","B. Ohio State studies","C. Michigan studies","D. Path-goal theory","E. Leadership Grid"],a:["D"]},
{q:"One of the reasons Steve Jobs was very successful at Apple was his charisma. From this observation, we can infer that he had ___ power.",o:["A. Referent","B. Reward","C. Legitimate","D. Coercive"],a:["A"]},
{q:"Which of the following is a Theory Y assumption?",o:["A. Social processes do not influence the performance of workers.","B. People are not internally motivated to achieve their goals.","C. People do not naturally dislike work.","D. People perform better when they are threatened by the manager."],a:["C"]},
{q:"Which of the following is the most probable motive for a manager to engage in political behavior?",o:["A. To avoid covert activities","B. To acquire power","C. To promote clear communication","D. To promote transparency"],a:["B"]},
{q:"Vernique, a manager, consults with her subordinates and encourages their involvement in the decision making process. Based on the path-goal theory, what kind of leader behavior is Vernique exhibiting?",o:["A. Job-oriented","B. Employee-centered","C. Achievement-oriented","D. Participative"],a:["D"]},
{q:"Why has the importance of cross-cultural leadership increased in today's times?",o:["A. Because of improving profit margins","B. Because of office politics","C. Because of increasing unethical practices","D. Because of the improving diversity ratios in workplaces"],a:["D"]},
{q:"Which of the following is an example of a good leader in the context of business?",o:["A. A person who relies on force to lead people","B. A person who disobeys authority","C. A person who is efficient and does not delegate his or her duties","D. A person who can influence others"],a:["D"]},

// MANAGEMENT FUNDAMENTALS
{q:"______ can be defined as a set of activities directed at an organization's resources, with the aim of achieving organizational goals in an efficient and effective manner.",o:["A. Economics","B. A theory","C. Management","D. Self-dealing"],a:["C"]},
{q:"Determining how a company's activities and resources are to be grouped is called",o:["A. leading.","B. controlling.","C. divesting.","D. planning.","E. Organizing."],a:["E"]},
{q:"The management at Loft Corp. has introduced new employment policies. The managers are now tracking and monitoring the implementation of the new policies. Which of the following management functions is illustrated?",o:["A. Decision making","B. Controlling","C. Organizing","D. Leading"],a:["B"]},
{q:"A management process is considered to be effective when:",o:["A. overhead production costs are increased.","B. the right decisions are made and implemented.","C. decisions are made independently of the organization's external environment.","D. the same amount of resources is allocated to all the functions of the organization."],a:["B"]},

{q:"Which of the following statements about administrative management is true?",o:["A. It deals with the jobs of individual employees.","B. It was first introduced by Frank and Lillian Gilbreth.","C. It focuses solely on combating soldiering.","D. It encompasses the concepts of planning, organizing, leading, and controlling."],a:["D"]},
{q:"Which of the following statements about first-line managers is true?",o:["A. They are primarily responsible for implementing policies made by top managers.","B. They are typically involved in creating overall organizational strategies and goals.","C. They officially represent their organization to the external environment.","D. They typically spend a large proportion of their time supervising the work of their subordinates.","E. They make decisions about activities such as acquiring other companies and entering or abandoning various markets."],a:["D"]},

{q:"When a manager answers a subordinate's question regarding the process of creating a report from raw data, he is relying on his ______ skills.",o:["A. abstract","B. technical","C. time management","D. decision-making","E. interpersonal"],a:["B"]},
{q:"When a manager writes an email to his employees that provides details about the upcoming annual company picnic, he is most likely to be using his ____ skills.",o:["A. communication","B. technical","C. conceptual","D. interpersonal"],a:["A"]},
{q:"skills refer to the abilities of managers to think in the abstract.",o:["A. Time management","B. Technical","C. Conceptual","D. Interpersonal"],a:["C"]},
{q:"______ skills refer to a manager's ability to prioritize work, to work efficiently, and to delegate work appropriately.",o:["A. Time management","B. Technical","C. Conceptual","D. Interpersonal","E. Communication"],a:["A"]},
{q:"Which of the following would be included in the management function of planning?",o:["A. Selecting the course of action most likely to lead to success","B. Monitoring progress toward the achievement of goals","C. Motivating others to higher levels of achievement","D. Communicating company policies to subordinates","E. Organizing people and resources"],a:["A"]},
{q:"Which of the following statements about the contingency perspective is true?",o:["A. It is a part of the classical perspective of management.","B. It states that effective managerial behavior in one situation cannot always be generalized to other situations.","C. It states that all employees tend to perform better when they are promised higher incentives.","D. It states that the behavior of employees at work is not influenced by social processes."],a:["B"]},

// DECISION MAKING
{q:"R&D at Venus Electronics Inc. has created an innovative new device. Management now needs to decide if Venus should launch this device as its next new product. This is an example of a(n) ______ decision.",o:["A. Frequent","B. Nonprogrammed","C. Structured","D. Operational","E. Programmed"],a:["B"]},
{q:"A(n) ______ decision is a decision that is relatively structured or recurs with some frequency (or both).",o:["A. custom-made","B. novel","C. unstructured","D. intuitive","E. programmed"],a:["E"]},
{q:"______ is a commitment to finding and using the best theory and data available at the time to make a decision.",o:["A. Rational decision making","B. Classical decision making","C. Rational management","D. Evidence-based management"],a:["D"]},
{q:"In decision making, a condition of ______ exists when a decision maker knows what the alternatives are and what conditions are associated with each alternative.",o:["A. Risk","B. Uncertainty","C. Certainty","D. Ambivalence","E. Imperfect information"],a:["C"]},
{q:"Which of the following statements is true in the context of decision making under a state of risk?",o:["A. The decision maker clearly knows the alternatives.","B. The decision maker uses probability estimates to assess alternatives.","C. The decision maker is least likely to choose a bad alternative.","D. The decision maker has an accurate understanding of payoffs of all the alternatives.","E. The decision maker seldom considers his or her past experience while making the decision."],a:["B"]},
{q:"Which of the following statements is true in the context of decision making under a condition of uncertainty?",o:["A. A decision maker greatly relies on intuition, judgment, and experience.","B. A decision maker clearly knows all the risks associated with alternatives to a problem.","C. A decision maker puts in least effort and uses a pre-determined structure for decision making.","D. A decision maker is able to estimate the payoffs and risks associated with alternatives."],a:["A"]},
{q:"One advantage of group decision making is:",o:["A. groupthink.","B. saved time.","C. more acceptance of the final decision.","D. lowered cost of decision making."],a:["C"]},
{q:"The classical decision model is a prescriptive approach, meaning that it",o:["A. provides managers with alternatives.","B. tells managers how they should make decisions.","C. assumes all decisions are made subjectively.","D. allows no room for flexibility."],a:["B"]},
{q:"In the rational decision-making model, once the alternatives have been evaluated, the next step is to",o:["A. select the best alternative.","B. implement the chosen alternative.","C. evaluate the results of the chosen alternative.","D. identify the available alternatives."],a:["A"]},
{q:"In which step of the rational decision-making model does the decision maker test the feasibility and satisfactoriness of alternatives before choosing one?",o:["A. Identifying alternatives","B. Implementing the chosen alternative","C. Defining the situation","D. Following up the implementation","E. Evaluating alternatives"],a:["E"]},
{q:"In general, while identifying alternatives, the more important the decision,",o:["A. the more alternatives should be generated.","B. the less the chances of managers making the right decision.","C. the less the time needed to make the decision.","D. the more the tendency of managers to ignore intuitions."],a:["A"]},
{q:"Ryan, the production manager at the Tan Shoes Company, chose the cheapest leather-cutting machine from a set of five machines. Ryan was engaged in",o:["A. decision making.","B. optimizing.","C. rationalizing.","D. brainstorming.","E. social loafing."],a:["B"]},

  },

  },
  {

    a: ["A"]
  },

    q: "Lucy needs to buy a new laptop for her business, and she buys a particular brand even though it does not support the software that is required for her business. She does this because all her family members have used computers of the same brand all their lives. This is an example of how decision makers are constrained by _____.",

  },
  {

  },
  {

];
// =================== STATE ===================
let questions=[],ci=0,sel=[],answered=false,score=0,wc=0,sc=0,hist=[],chosenN=10;
let timerInterval=null, timerLeft=60, TIMER_MAX=60;

document.getElementById('bankInfo').textContent = `📚 Ngân hàng: ${Q.length} câu hỏi`;

document.getElementById('modeGrid').addEventListener('click', e => {
  const c = e.target.closest('.mode-card');
  if (!c) return;
  soundClick();
  document.querySelectorAll('.mode-card').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  chosenN = parseInt(c.dataset.n);
});

document.getElementById('startBtn').addEventListener('click', e => {
  addRipple(e.currentTarget, e);
  soundStart();
  const shuffled = [...Q].sort(() => Math.random() - 0.5);
  questions = chosenN === 0 ? shuffled : shuffled.slice(0, Math.min(chosenN, shuffled.length));
  document.getElementById('welcome').classList.add('hide');
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('sTotal').textContent = questions.length;
  ci = 0; score = 0; wc = 0; sc = 0; hist = [];
  loadQ();
});

// =================== TIMER ===================
function startTimer() {
  clearInterval(timerInterval);
  timerLeft = TIMER_MAX;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timerLeft--;
    updateTimerUI();
    if (timerLeft <= 0) {
      clearInterval(timerInterval);
      timeOut();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function updateTimerUI() {
  const pct = timerLeft / TIMER_MAX;
  const circumference = 2 * Math.PI * 22; // 138.23
  const offset = circumference * (1 - pct);

  const circle = document.getElementById('timerCircle');
  const num = document.getElementById('timerNum');
  const bar = document.getElementById('timerBar');

  if (!circle) return;

  circle.style.strokeDashoffset = offset;
  num.textContent = timerLeft;
  bar.style.width = (pct * 100) + '%';

  // Color states
  const isWarn = timerLeft <= 20 && timerLeft > 10;
  const isDanger = timerLeft <= 10;

  circle.className = 'fill' + (isDanger ? ' danger' : isWarn ? ' warn' : '');
  num.className = 'timer-num' + (isDanger ? ' danger pulse' : isWarn ? ' warn' : '');
  bar.className = 'timer-bar-fill' + (isDanger ? ' danger' : isWarn ? ' warn' : '');

  // Tick sound on last 10s
  if (isDanger && soundOn) {
    playTone(880, 'sine', 0.04, 0.08);
  }
}

function timeOut() {
  if (answered) return;
  answered = true;
  wc++;
  hist.push({ q: questions[ci], selected: [], correct: false, skipped: false, timeout: true });

  // Shake & show correct answers
  document.getElementById('qCard').classList.add('shake');
  setTimeout(() => document.getElementById('qCard').classList.remove('shake'), 400);
  soundWrong();

  document.querySelectorAll('.opt-btn').forEach(btn => {
    const letter = btn.querySelector('.opt-letter').textContent;
    btn.disabled = true;
    if (questions[ci].a.includes(letter)) {
      btn.classList.add('show-correct');
      btn.querySelector('.opt-icon').textContent = '✓';
    }
  });

  document.getElementById('sWr').textContent = wc;
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'flex';
  document.getElementById('nextBtn').textContent = ci < questions.length - 1 ? 'Tiếp theo →' : 'Xem kết quả 🎯';

  // Show timeout message
  const el = document.getElementById('expl');
  el.textContent = '⏰ Hết giờ! Đáp án đúng đã được hiển thị.';
  el.classList.add('show');
}

function loadQ() {
  const q = questions[ci];
  answered = false; sel = [];
  const card = document.getElementById('qCard');
  card.style.animation = 'none'; card.offsetHeight;
  card.style.animation = 'cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both';

  document.getElementById('qNum').textContent = `QUESTION ${String(ci+1).padStart(2,'0')} / ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  const multi = q.m || q.a.length > 1;
  document.getElementById('mBadge').innerHTML = multi ? '<span class="multi-badge">✦ Chọn nhiều đáp án</span>' : '';

  const container = document.getElementById('opts');
  container.innerHTML = '';
  q.o.forEach(opt => {
    const letter = opt.charAt(0), text = opt.slice(3);
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letter}</span><span class="opt-text">${text}</span><span class="opt-icon"></span>`;
    btn.addEventListener('click', ev => {
      addRipple(btn, ev);
      pickOpt(btn, letter, multi);
    });
    container.appendChild(btn);
  });

  document.getElementById('expl').className = 'expl';
  document.getElementById('sCur').textContent = ci + 1;
  document.getElementById('sOk').textContent = score;
  document.getElementById('sWr').textContent = wc;

  const pct = Math.round(ci / questions.length * 100);
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLbl').textContent = `Câu ${ci+1} / ${questions.length}`;
  document.getElementById('pPct').textContent = pct + '%';

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').style.display = 'flex';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'flex';
  startTimer();
}

function pickOpt(btn, letter, multi) {
  if (answered) return;
  soundSelect();
  if (!multi) {
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    sel = [letter]; btn.classList.add('selected');
  } else {
    const i = sel.indexOf(letter);
    if (i > -1) { sel.splice(i, 1); btn.classList.remove('selected'); }
    else { sel.push(letter); btn.classList.add('selected'); }
  }
  document.getElementById('submitBtn').disabled = sel.length === 0;
}

document.getElementById('submitBtn').addEventListener('click', ev => {
  if (answered || sel.length === 0) return;
  addRipple(ev.currentTarget, ev);
  soundSubmit();
  answered = true;
  stopTimer();
  const q = questions[ci];
  const correct = q.a.slice().sort().join('') === sel.slice().sort().join('');
  if (correct) score++; else wc++;
  hist.push({ q, selected: [...sel], correct });

  setTimeout(() => {
    if (correct) { soundCorrect(); document.getElementById('qCard').classList.add('correct-pulse'); setTimeout(() => document.getElementById('qCard').classList.remove('correct-pulse'), 600); }
    else { soundWrong(); document.getElementById('qCard').classList.add('shake'); setTimeout(() => document.getElementById('qCard').classList.remove('shake'), 400); }
  }, 100);

  document.querySelectorAll('.opt-btn').forEach(btn => {
    const letter = btn.querySelector('.opt-letter').textContent;
    const isC = q.a.includes(letter), isSel = sel.includes(letter);
    btn.disabled = true;
    if (isSel && isC) { btn.classList.add('correct'); btn.querySelector('.opt-icon').textContent = '✓'; }
    else if (isSel && !isC) { btn.classList.add('wrong'); btn.querySelector('.opt-icon').textContent = '✗'; }
    else if (!isSel && isC) { btn.classList.add('show-correct'); btn.querySelector('.opt-icon').textContent = '✓'; }
  });

  if (q.x) {
    const el = document.getElementById('expl');
    el.textContent = '💡 ' + q.x;
    el.classList.add('show');
  }

  document.getElementById('sOk').textContent = score;
  document.getElementById('sWr').textContent = wc;
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'flex';
  document.getElementById('nextBtn').textContent = ci < questions.length - 1 ? 'Tiếp theo →' : 'Xem kết quả 🎯';
  document.getElementById('nextBtn').classList.add('bounce');
  setTimeout(() => document.getElementById('nextBtn').classList.remove('bounce'), 350);
});

document.getElementById('skipBtn').addEventListener('click', ev => {
  addRipple(ev.currentTarget, ev);
  soundSkip();
  stopTimer();
  sc++;
  hist.push({ q: questions[ci], selected: [], correct: false, skipped: true });
  go();
});

document.getElementById('nextBtn').addEventListener('click', ev => {
  soundClick();
  go();
});

function go() { ci++; if (ci >= questions.length) showResult(); else loadQ(); }

function showResult() {
  stopTimer();
  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('result');
  res.classList.add('show');
  const total = questions.length, pct = Math.round(score / total * 100);
  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('rSub').textContent = `${score} / ${total} câu trả lời đúng`;
  document.getElementById('rOk').textContent = score;
  document.getElementById('rWr').textContent = wc;
  document.getElementById('rSk').textContent = sc;

  let emoji, rank, bg, color;
  if (pct >= 90) { emoji='🏆'; rank='XUẤT SẮC'; bg='linear-gradient(135deg,#d4a833,#b8862a)'; color='#fff'; }
  else if (pct >= 75) { emoji='🎉'; rank='GIỎI'; bg='linear-gradient(135deg,#6b8c6e,#4a6b4d)'; color='#fff'; }
  else if (pct >= 60) { emoji='👍'; rank='KHÁ'; bg='linear-gradient(135deg,#3d7cb5,#2a5a8c)'; color='#fff'; }
  else if (pct >= 40) { emoji='📚'; rank='TRUNG BÌNH'; bg='linear-gradient(135deg,#c4522a,#9e3d1c)'; color='#fff'; }
  else { emoji='💪'; rank='CẦN CỐ GẮNG'; bg='linear-gradient(135deg,#7a5c4a,#5a3d2b)'; color='#fff'; }

  document.getElementById('rEmoji').textContent = emoji;
  const rt = document.getElementById('rTag');
  rt.textContent = rank; rt.style.background = bg; rt.style.color = color;

  setTimeout(soundComplete, 200);
}

document.getElementById('revBtn').addEventListener('click', ev => {
  soundClick();
  const sec = document.getElementById('revSection'), list = document.getElementById('revList');
  if (sec.style.display === 'block') { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = '';
  hist.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = `rev-item ${h.correct ? 'ok' : 'ng'}`;
    const qt = h.q.q.length > 110 ? h.q.q.slice(0, 110) + '…' : h.q.q;
    let html = '';
    if (h.skipped) { html = '<span class="ans-tag wrong">Bỏ qua</span>'; }
    else if (h.timeout) { html = '<span class="ans-tag wrong">⏰ Hết giờ</span>'; h.q.a.forEach(a => { html += `<span class="ans-tag correct">Đúng: ${a}</span>`; }); }
    else {
      h.selected.forEach(s => { html += `<span class="ans-tag ${h.q.a.includes(s) ? 'right' : 'wrong'}">Chọn: ${s}</span>`; });
      if (!h.correct) h.q.a.forEach(a => { if (!h.selected.includes(a)) html += `<span class="ans-tag correct">Đúng: ${a}</span>`; });
    }
    div.innerHTML = `<div class="rev-q"><span class="rev-n">Q${i+1}</span><span>${qt}</span></div><div class="rev-ans">${html}</div>`;
    list.appendChild(div);
  });
});

document.getElementById('restartBtn').addEventListener('click', ev => {
  addRipple(ev.currentTarget, ev);
  soundStart();
  stopTimer();
  ci = 0; score = 0; wc = 0; sc = 0; hist = []; questions = [];
  document.getElementById('result').classList.remove('show');
  document.getElementById('revSection').style.display = 'none';
  document.getElementById('welcome').classList.remove('hide');
});
</script>
</body>
</html>
